{% block content %}
    <h1>Delete Property</h1>
    <p>Are you sure you want to delete this property?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
        <a href="{% url 'apps.home:list_properties' %}">No, cancel</a>
    </form>
{% endblock %}
