{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Real Estate{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800">
    <!-- Navigation -->
    <nav class="sticky top-0 z-40 bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-home text-white text-lg"></i>
                    </div>
                    <span class="text-xl font-bold text-slate-800">Dream<span class="text-blue-500">Home</span></span>
                </a>
                <div class="flex items-center gap-6">
                    <a href="/" class="text-slate-600 hover:text-slate-800 font-medium transition-colors">Home</a>
                    <a href="{% url 'apps.home:list_properties' %}" class="text-slate-600 hover:text-slate-800 font-medium transition-colors">Properties</a>
                    <a href="#" class="text-slate-600 hover:text-slate-800 font-medium transition-colors flex items-center gap-1">
                        <i class="fas fa-plus-circle"></i>
                        Create Property
                    </a>
                    <a href="#" class="text-slate-600 hover:text-slate-800 font-medium transition-colors flex items-center gap-1">
                        <i class="fas fa-user-circle"></i>
                        Profile
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-slate-800 text-white mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div class="text-center">
                <p>&copy; 2026 Real Estate Platform. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
