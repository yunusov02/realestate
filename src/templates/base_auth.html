{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DreamHome{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%233b82f6'/%3E%3Cstop offset='100%25' style='stop-color:%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Cpath d='M50 18 L25 42 L32 42 L32 72 L42 72 L42 55 L58 55 L58 72 L68 72 L68 42 L75 42 Z' fill='white'/%3E%3Crect x='44' y='62' width='12' height='10' rx='1' fill='white' opacity='0.9'/%3E%3C/svg%3E">
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-indigo-50 text-slate-800 min-h-screen">
    <nav class="w-full py-4 px-4 sm:px-6 lg:px-8 flex items-center justify-between">
        <a href="/" class="inline-flex items-center gap-3">
            <div class="w-11 h-11 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                <i class="fas fa-home text-white text-lg"></i>
            </div>
            <span class="text-xl font-bold text-slate-900">Dream<span class="text-blue-500">Home</span></span>
        </a>
        <div class="flex items-center gap-3">
            {% if user.is_authenticated %}
                <a href="{% url 'apps.users:logout' %}" class="inline-flex items-center gap-2 bg-white/90 text-slate-800 px-4 py-2 rounded-full shadow-sm hover:bg-white transition">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            {% else %}
                <a href="{% url 'apps.users:login' %}" class="text-slate-700 hover:text-slate-900 font-medium transition">Login</a>
                <a href="{% url 'apps.users:register' %}" class="inline-flex items-center gap-2 bg-gradient-to-r from-blue-500 to-indigo-600 text-white px-4 py-2 rounded-full shadow-lg hover:shadow-blue-500/25 transition">
                    <i class="fas fa-user-plus"></i>
                    Register
                </a>
            {% endif %}
        </div>
    </nav>

    <!-- Main Content -->
    {% block content %}{% endblock %}

    <!-- Footer (optional for auth pages) -->
    {% block footer %}
    <footer class="bg-slate-800 text-white mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="text-center">
                <p>&copy; 2026 DreamHome. All rights reserved.</p>
            </div>
        </div>
    </footer>
    {% endblock %}
</body>
</html>
